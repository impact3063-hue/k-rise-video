name: Render Video on Dispatch

on:
  repository_dispatch:
    types: [render_video]

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Extract video data
        run: |
          echo '${{ toJson(github.event.client_payload.video_data) }}' > public/video-data-master.json
      
      - name: Generate video data
        run: |
          python generate_video_data_master_v3.2.py
      
      - name: Build Remotion video
        run: |
          npm run build
      
      - name: Render video
        run: |
          npx remotion render src/index.ts KRiseTikTok3 output.mp4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: rendered-video
          path: output.mp4
      
      - name: Notify completion
        run: |
          echo "✅ Video rendering completed"
          echo "Timestamp: ${{ github.event.client_payload.timestamp }}"
          echo "Source: ${{ github.event.client_payload.source }}"
