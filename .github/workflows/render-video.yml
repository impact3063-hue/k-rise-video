name: Render Video on Dispatch

on:
  repository_dispatch:
    types: [render_video]

permissions:
  contents: write
  actions: read
  
jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install janome openai python-dotenv
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Extract video data
        run: |
          echo '${{ toJson(github.event.client_payload.video_data) }}' > public/video-data-master.json
      
      - name: Generate video data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python generate_video_data_master_v3.2.py
      
      - name: Build Remotion video
        run: |
          npm run build
      
      - name: Render video
        run: |
          npx remotion render src/index.ts KRiseTikTok3 output.mp4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output.mp4
      
      - name: Notify Discord - Rendering Complete
        if: always()
        run: |
          curl -X POST -H "Content-Type: application/json" -d '{"content": "🎬 【K-RISE完全開通】動画のレンダリングが完了しました！成果物はArtifactsからダウンロード可能です。"}' ${{ secrets.DISCORD_WEBHOOK_URL }}
