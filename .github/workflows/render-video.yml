name: Render Video on Dispatch

on:
  repository_dispatch:
    types: [render_video]

permissions:
  contents: write
  actions: read
  
jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install janome openai python-dotenv
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Extract video data
        run: |
          echo '${{ toJson(github.event.client_payload.video_data) }}' > public/video-data-master.json
      
      - name: Generate video data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python generate_video_data_master_v3.2.py
      
      - name: Build Remotion video
        run: |
          npm run build
      
      - name: Render video
        run: |
          npx remotion render src/index.ts KRiseTikTok3 output.mp4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output.mp4
      
      - name: Notify Discord - Rendering Complete
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "✅ **動画レンダリング完了**\n\n🎬 **プロジェクト**: K-RISE TikTok 3\n⏱️ **レンダリング時間**: 約54秒\n📦 **出力**: output.mp4\n\n💡 動画は GitHub Actions の Artifacts からダウンロードできます\n🔗 **ワークフロー**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "username": "K-RISE Rendering Bot",
              "avatar_url": "https://cdn.discordapp.com/embed/avatars/0.png"
            }'
          echo "✅ Discord notification sent"
          echo "Timestamp: ${{ github.event.client_payload.timestamp }}"
          echo "Source: ${{ github.event.client_payload.source }}"
