name: Render Video on Dispatch

on:
  repository_dispatch:
    types: [render_video]

permissions:
  contents: write
  actions: read
  
jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install janome openai python-dotenv
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Extract video data
        run: |
          echo '${{ toJson(github.event.client_payload.video_data) }}' > public/video-data-master.json
      
      - name: Generate video data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python generate_video_data_master_v3.2.py
      
      - name: Build Remotion video
        run: |
          npm run build
      
      - name: Render video
        run: |
          npx remotion render src/index.ts KRiseTikTok3 output.mp4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output.mp4
      
      - name: Notify Discord - Rendering Complete
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # 投稿セットの作成
          CAPTION_TEXT="BTSを日本に導いた伝説のプロデューサー・出口氏が直接審査。\n本気で世界を目指すダンサーだけ、今すぐプロフィール欄の公式LINEからエントリーしてくれ！"
          HASHTAGS="#KRiseDanceProject #ダンスオーディション #KPOPダンサー #RIIZE #ダンスレッスン #公式LINEへ"
          SCRIPT_TEXT="BTSを導いた伝説の環境で、お前のダンスを世界基準へ変える。限界を決めんな、今すぐLINEから狂った熱量を見せてみろ。"

          # JSONペイロード作成と送信
          PAYLOAD=$(jq -n \
            --arg run_url "$RUN_URL" \
            --arg caption "$CAPTION_TEXT" \
            --arg tags "$HASHTAGS" \
            --arg script "$SCRIPT_TEXT" \
            '{content: "🎬 **【K-RISE完全開通】動画のレンダリングが完了しました！**\n\n📦 **動画ダウンロード:**\n\($run_url)\n\n───────────────────\n📝 **【SNS投稿用コピペセット】**\n\n**■ 投稿文（キャプション）**\n\($caption)\n\n**■ ハッシュタグ**\n\($tags)\n\n**■ 動画台本**\n\($script)"}')

          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK_URL }}
